env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
project_name: pd-agent
builds:
  - id: pd-agent-windows
    flags:
      - -trimpath
    ldflags:
      - -s -w
    binary: pd-agent
    env:
      - CGO_ENABLED=0
    main: ./cmd/pd-agent
    goos:
      - windows
    # arm64 omitted: Mzack9999/gopacket/pcap has no defs_windows_arm64.go.
    goarch:
      - amd64
      - 386
archives:
- formats:
  - zip
  name_template: '{{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}macOS{{ else }}{{ .Os }}{{ end }}_{{ .Arch }}'

checksum:
  name_template: "{{ .ProjectName }}-windows-checksums.txt"
